name: Verify Predictions

on:
  schedule:
    - cron: "0 2 * * *"   # Daily at 2:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Verification Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_KEY }}
          GLOBALPULSE_MODE: production
        run: |
          python core/actions/run_verify.py

      - name: Run Pipeline Health Check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GLOBALPULSE_MODE: production
        run: |
          python core/actions/verify_pipeline.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "Verification workflow FAILED! Check GitHub Actions log."
