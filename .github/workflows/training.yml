name: Weekly Retraining

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at Midnight
  workflow_dispatch:      # Allow manual trigger

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Model Retraining Pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python run_pipeline.py

      - name: Upload new Champion Model to Supabase Storage
        # The run_pipeline.py should handle the upload. This is just a placeholder to ensure the workflow finishes cleanly.
        run: echo "Retraining completed. Models uploaded directly to Supabase via Python."
