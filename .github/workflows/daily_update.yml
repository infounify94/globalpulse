name: Daily Data Update

# Runs every day at 6:00 AM UTC (11:30 AM IST)
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:  # Also allows manual trigger from GitHub UI

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from GitHub Secrets
        run: |
          cat > .env << EOF
          GLOBALPULSE_DB_URL=${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_KEY }}
          CRICAPI_KEY=${{ secrets.CRICAPI_KEY }}
          OPENWEATHER_KEY=${{ secrets.OPENWEATHER_KEY }}
          GLOBALPULSE_MODE=production
          EOF

      - name: Run verification against latest completed matches
        run: python core/actions/run_verify.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_KEY }}
          GLOBALPULSE_MODE: production

      - name: Check for new Cricsheet data
        run: |
          python -c "
          from etl.collectors.cricsheet_collector import CricsheetCollector
          c = CricsheetCollector(data_dir='data/raw/cricsheet')
          files = c.collect()
          print(f'Cricsheet sync complete: {len(files)} total files')
          "
        continue-on-error: true  # Don't fail workflow if Cricsheet is down

      - name: Show database health
        run: python core/actions/verify_pipeline.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GLOBALPULSE_MODE: production

      - name: Notify on failure
        if: failure()
        run: |
          echo "Daily update failed! Check the Actions log."
